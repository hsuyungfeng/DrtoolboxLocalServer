{% extends 'base.html' %}

{% block title %}CRM 分析報告 - 診所管理系統{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="page-title">CRM 分析報告</h2>
        <div>
            <button class="btn btn-outline-primary btn-sm" onclick="fetchAllCrmData()">重新整理</button>
        </div>
    </div>

    <!-- CRM 分析狀態卡片 -->
    <div class="row g-3 mb-4" id="crm-status-row">
        <div class="col-md-3">
            <div class="card h-100 shadow-sm border-0" id="crm-retention-card">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">患者回診追蹤</h6>
                    <span class="badge bg-secondary mb-2" id="crm-status-retention">尚未分析</span>
                    <p class="text-muted small mb-0" id="crm-time-retention">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 shadow-sm border-0" id="crm-trends-card">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">健康趨勢</h6>
                    <span class="badge bg-secondary mb-2" id="crm-status-trends">尚未分析</span>
                    <p class="text-muted small mb-0" id="crm-time-trends">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 shadow-sm border-0" id="crm-appointments-card">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">預約提醒</h6>
                    <span class="badge bg-secondary mb-2" id="crm-status-appointments">尚未分析</span>
                    <p class="text-muted small mb-0" id="crm-time-appointments">-</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100 shadow-sm border-0" id="crm-weekly-card">
                <div class="card-body text-center">
                    <h6 class="text-muted mb-2">週度綜合報告</h6>
                    <span class="badge bg-secondary mb-2" id="crm-status-weekly">尚未分析</span>
                    <p class="text-muted small mb-0" id="crm-time-weekly">-</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 手動觸發分析 -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-transparent">
            <h5 class="mb-0">手動觸發分析</h5>
        </div>
        <div class="card-body">
            <div class="row g-2 align-items-end">
                <div class="col-md-8">
                    <label class="form-label">分析類型</label>
                    <select class="form-select" id="analysis-type">
                        <option value="patient_retention">患者回診追蹤 (6 個月未回診)</option>
                        <option value="health_trends">健康趨勢 (近 30 天)</option>
                        <option value="appointment_reminders">預約提醒 (未來 3 天)</option>
                        <option value="weekly_summary">週度綜合報告</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100" onclick="triggerAnalysis()" id="trigger-btn">
                        立即分析
                    </button>
                </div>
            </div>
            <div id="analysis-result" class="mt-3 d-none"></div>
        </div>
    </div>

    <!-- 報告列表 -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
            <h5 class="mb-0">歷史報告</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>時間</th>
                            <th>類別</th>
                            <th>標題</th>
                            <th>來源</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="reports-body">
                        <tr><td colspan="5" class="text-center text-muted py-4">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const typeLabels = {
        'patient_retention': '患者回診追蹤',
        'health_trends': '健康趨勢',
        'appointment_reminders': '預約提醒',
        'weekly_summary': '週度綜合報告',
    };

    async function fetchCrmStatus() {
        try {
            const resp = await fetch('/api/v1/crm/status');
            const result = await resp.json();
            if (!result.success) return;
            const status = result.data;

            for (const [key, info] of Object.entries(status)) {
                const statusEl = document.getElementById(`crm-status-${key}`);
                const timeEl = document.getElementById(`crm-time-${key}`);
                if (statusEl) {
                    if (info.has_report) {
                        statusEl.className = 'badge bg-success mb-2';
                        statusEl.textContent = '已有報告';
                    } else {
                        statusEl.className = 'badge bg-secondary mb-2';
                        statusEl.textContent = '尚未分析';
                    }
                }
                if (timeEl) {
                    timeEl.textContent = info.latest_time
                        ? new Date(info.latest_time + 'Z').toLocaleString('zh-TW')
                        : '-';
                }
            }
        } catch (e) {
            console.error('CRM status fetch failed:', e);
        }
    }

    async function fetchReports() {
        try {
            const resp = await fetch('/api/v1/crm/reports');
            const result = await resp.json();
            const tbody = document.getElementById('reports-body');
            if (!result.success || !result.data || result.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">尚無分析報告</td></tr>';
                return;
            }
            tbody.innerHTML = result.data.map(r => `
                <tr>
                    <td class="small">${new Date(r.created_at + 'Z').toLocaleString('zh-TW')}</td>
                    <td><span class="badge bg-info">${typeLabels[r.category] || r.category}</span></td>
                    <td>${escapeHtml(r.title)}</td>
                    <td><small class="text-muted">${r.is_auto ? '自動排程' : '手動觸發'}</small></td>
                    <td>
                        <button class="btn btn-outline-secondary btn-sm" onclick="toggleDetail(${r.id}, this)">展開</button>
                    </td>
                </tr>
                <tr id="detail-${r.id}" style="display:none">
                    <td colspan="5">
                        <div class="bg-light p-3 rounded">
                            <pre class="mb-0" style="white-space:pre-wrap;font-size:0.85rem">${escapeHtml(r.summary || '(無摘要)')}</pre>
                            ${r.data_json ? `<hr><details><summary class="small text-muted">原始數據 (JSON)</summary><pre class="small mt-2" style="white-space:pre-wrap">${escapeHtml(JSON.stringify(JSON.parse(r.data_json), null, 2))}</pre></details>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            console.error('Reports fetch failed:', e);
        }
    }

    async function triggerAnalysis() {
        const type = document.getElementById('analysis-type').value;
        const btn = document.getElementById('trigger-btn');
        const resultEl = document.getElementById('analysis-result');

        btn.disabled = true;
        btn.textContent = '分析中...';
        resultEl.className = 'mt-3 d-block alert alert-info';
        resultEl.textContent = '正在執行分析，請稍候...';

        try {
            const resp = await fetch('/api/v1/crm/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: type })
            });
            const result = await resp.json();

            if (result.success) {
                resultEl.className = 'mt-3 d-block alert alert-success';
                resultEl.innerHTML = `<strong>${result.message}</strong><br><small class="text-muted">${escapeHtml((result.data && result.data.summary) || '')}</small>`;
                fetchCrmStatus();
                fetchReports();
            } else {
                resultEl.className = 'mt-3 d-block alert alert-danger';
                resultEl.textContent = '分析失敗: ' + (result.error || '未知錯誤');
            }
        } catch (e) {
            resultEl.className = 'mt-3 d-block alert alert-danger';
            resultEl.textContent = '分析失敗: ' + e.message;
        } finally {
            btn.disabled = false;
            btn.textContent = '立即分析';
        }
    }

    function toggleDetail(id, btn) {
        const detailRow = document.getElementById(`detail-${id}`);
        if (detailRow.style.display === 'none') {
            detailRow.style.display = '';
            btn.textContent = '收合';
        } else {
            detailRow.style.display = 'none';
            btn.textContent = '展開';
        }
    }

    function escapeHtml(str) {
        if (!str) return '-';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function fetchAllCrmData() {
        fetchCrmStatus();
        fetchReports();
    }

    document.addEventListener('DOMContentLoaded', fetchAllCrmData);
</script>
{% endblock %}

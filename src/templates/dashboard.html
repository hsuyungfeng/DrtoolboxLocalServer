<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drtoolbox - 訓練控制面板</title>
    <link rel="stylesheet" href="/static/css/index.css?v=12">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>訓練控制面板</h1>
            <nav class="nav-tabs">
                <button class="tab-btn active" data-tab="curation">資料校正</button>
                <button class="tab-btn" data-tab="articles">文章同步</button>
                <button class="tab-btn" data-tab="analytics">營運數據</button>
                <button class="tab-btn" data-tab="upload">上傳資料</button>
                <button class="tab-btn" data-tab="chat">即時對話</button>
            </nav>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="tab-btn" id="triggerFactCheckBtn" style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); white-space: nowrap; height: 42px;">🔍 執行今日網實核查</button>
            <button class="export-btn" id="exportBtn" style="height: 42px;">匯出 JSONL</button>
        </div>
    </header>
    
    <main>
        <!-- Tab 1: Curation -->
        <div id="tab-curation" class="tab-content active-tab">
            <div class="glass-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
                    <h2 style="margin:0;">待校正清單</h2>
                    <div style="display: flex; gap: 10px;">
                        <button class="tab-btn" id="selectHighConfBtn" style="font-size: 0.8rem; padding: 5px 12px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa;">🎯 勾選高信心 (>=85%)</button>
                        <button class="tab-btn" id="selectAllBtn" style="font-size: 0.8rem; padding: 5px 12px; background: rgba(255,255,255,0.05);">全選</button>
                        <button class="save-btn" id="batchSaveBtn" style="font-size: 0.8rem; padding: 5px 15px; width: auto; height: 32px; box-shadow: none;">批量儲存已選</button>
                    </div>
                </div>
                <div class="log-list" id="logList">
                    <!-- Logs will be injected here via JS -->
                </div>
            </div>
            
            <div class="glass-panel editor-panel" id="editorPanel" style="display: none;">
                <h2>校正編輯器</h2>
                <div id="evidencePanel" style="display: none; margin-bottom: 20px; padding: 15px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 12px;">
                    <h3 style="font-size: 0.9rem; color: #60a5fa; margin-bottom: 8px;">🌐 Hermes 網路搜尋證據 (查證來源)</h3>
                    <div id="evidenceContent" style="font-size: 0.85rem; color: #94a3b8; line-height: 1.5;"></div>
                </div>
                <div class="field-group">
                    <label>使用者提問 (可修改)</label>
                    <textarea id="editorPrompt" style="min-height: 80px; margin-bottom: 10px;"></textarea>
                </div>
                <div class="field-group">
                    <label>AI 回覆 (編輯以進行校正)</label>
                    <textarea id="editorResponse"></textarea>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="save-btn" id="saveBtn" style="flex: 2;">驗證並儲存</button>
                    <button class="tab-btn" id="discardBtn" style="flex: 1; background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); color: #f87171;">🗑️ 捨棄此項目</button>
                </div>
            </div>
        </div>

        <!-- Tab 4: Article Sync -->
        <div id="tab-articles" class="tab-content">
            <div style="display: flex; gap: 20px; height: calc(100vh - 150px);">
                <div class="glass-panel" style="width: 350px; flex-shrink: 0; overflow-y: auto;">
                    <h2 style="margin-bottom: 15px;">待同步文章 (已批准)</h2>
                    <div id="articleList" class="log-list"></div>
                </div>
                <div class="glass-panel" id="articleEditorPanel" style="flex: 1; display: none; overflow-y: auto;">
                    <h2>文章預覽 (Doctor Toolbox 格式)</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">
                        請將以下內容複製並貼上到 <a href="https://doctor-toolbox.com/clinicBot" target="_blank" style="color: var(--accent-color);">Doctor Toolbox 後台</a>。
                    </p>
                    <div class="field-group" style="margin-bottom: 20px;">
                        <label>標題*</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="articleTitle" readonly style="flex: 1; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.1);">
                            <button class="tab-btn" id="copyTitleBtn">📋 複製標題</button>
                        </div>
                    </div>
                    <div class="field-group"><label>類別</label><input type="text" id="articleCategory" readonly style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.1);"></div>
                    <div class="field-group">
                        <label>內容 (散文形式)*</label>
                        <textarea id="articleContent" style="min-height: 350px;"></textarea>
                        <button class="tab-btn" id="copyContentBtn" style="margin-top: 10px;">📋 複製文章內容</button>
                    </div>
                    <div style="display: flex; gap: 12px; margin-top: 30px;"><button class="save-btn" id="markSyncedBtn" style="flex: 1;">✅ 標記為已同步</button></div>
                </div>
            </div>
        </div>

        <!-- Tab 5: Analytics (BI Dashboard) -->
        <div id="tab-analytics" class="tab-content" style="grid-template-columns: 1fr 1fr; gap: 30px;">
            <div class="glass-panel">
                <h2>🔥 療程熱度榜 (本週)</h2>
                <div style="height: 350px;"><canvas id="proceduresChart"></canvas></div>
            </div>
            <div class="glass-panel">
                <h2>💡 病患痛點分布</h2>
                <div style="height: 350px;"><canvas id="painPointsChart"></canvas></div>
            </div>
        </div>
        
        <!-- Tab 2: Upload Data -->
        <div id="tab-upload" class="tab-content">
            <div class="glass-panel upload-panel" style="width:100%; max-width:850px;">
                <h2>上傳資料庫</h2>
                <div class="field-group">
                    <label>資料分類</label>
                    <select id="dataTypeSelect" style="width: 100%; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.25); color: white; border: 1px solid rgba(255,255,255,0.08);">
                        <option value="special">診所專屬行銷/服務資料 (Clinic Special)</option>
                        <option value="general">一般醫療衛教知識 (General Medical)</option>
                    </select>
                </div>
                <div class="dropzone" id="dropzone">
                    <p>將檔案拖曳至此</p>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button id="btnSelectFiles" class="tab-btn">選擇多個檔案</button>
                        <button id="btnSelectFolder" class="tab-btn">選擇整個資料夾</button>
                    </div>
                    <input type="file" id="fileInput" multiple style="display: none;">
                    <input type="file" id="folderInput" multiple webkitdirectory directory style="display: none;">
                </div>
                <div id="uploadStatus" class="upload-status"></div>
                <div class="progress-container" id="uploadProgressContainer"><div class="progress-bar" id="uploadProgressBar"></div></div>
                <div class="upload-stats-grid" id="uploadStatsGrid">
                    <div class="stat-card"><div>已成功</div><div class="stat-value success" id="statSuccess">0</div></div>
                    <div class="stat-card"><div>已失敗</div><div class="stat-value fail" id="statFail">0</div></div>
                    <div class="stat-card"><div>待處理</div><div class="stat-value pending" id="statPending">0</div></div>
                </div>
                <div style="margin-top: 30px;">
                    <h2>背景處理日誌</h2>
                    <div id="ocrLogContainer" style="background: rgba(0,0,0,0.25); border-radius: 12px; height: 180px; overflow-y: auto; padding: 16px; font-family: monospace; font-size: 0.9rem; color: #a3a3a3;"></div>
                </div>
            </div>
        </div>
        
        <!-- Tab 3: Live Chat -->
        <div id="tab-chat" class="tab-content">
            <div class="glass-panel chat-panel" style="width:100%; max-width:850px;">
                <h2>測試 Hermes 代理程式</h2>
                <div class="chat-history" id="chatHistory"></div>
                <div id="chatImagePreview" style="display: none; padding: 10px; position: relative;">
                    <img id="previewImg" src="" style="max-height: 100px; border-radius: 8px;">
                    <button id="clearImageBtn" style="position: absolute; top: 5px; right: 5px; background: #ef4444; border: none; color: white; border-radius: 50%; width: 20px; height: 20px;">×</button>
                </div>
                <div class="chat-input-area">
                    <button id="chatUploadBtn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">🖼️</button>
                    <input type="file" id="chatImageInput" style="display: none;" accept="image/*">
                    <input type="text" id="chatInput" placeholder="輸入訊息..." autocomplete="off">
                    <button class="send-btn" id="chatSendBtn">傳送</button>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/dashboard.js?v=12"></script>
</body>
</html>

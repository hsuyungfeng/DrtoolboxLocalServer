{% extends 'base.html' %}

{% block title %}病患臨床詳情 - 緻妍外科診所{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">🏥 病患臨床詳情</h1>
    <div id="patient-id-badge" class="badge bg-secondary">ID: {{ patient_id }}</div>
</div>

<div class="row">
    <!-- Sidebar: Patient Info -->
    <div class="col-md-4">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">👤 基本資料</div>
            <div class="card-body" id="patient-info">
                <div class="text-center py-4">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">🚨 風險與警示</div>
            <div class="card-body" id="risk-alerts">
                <p class="text-muted text-center">正在分析歷史對話...</p>
            </div>
        </div>
    </div>

    <!-- Main: Timeline & History -->
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <ul class="nav nav-tabs card-header-tabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#history" type="button">📜 對話歷史</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#images" type="button">📸 影像進度線</button>
                    </li>
                </ul>
            </div>
            <div class="card-body">
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="history">
                        <div id="chat-history-container" style="max-height: 600px; overflow-y: auto; padding: 10px;">
                            <p class="text-center py-5 text-muted">正在載入歷史對話...</p>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="images">
                        <div id="image-timeline" class="row">
                            <p class="text-center py-5 text-muted">此病患尚未上傳任何臨床照片。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const PATIENT_ID = {{ patient_id }};
    const STAFF_ID = 'staff-001';

    document.addEventListener('DOMContentLoaded', function() {
        loadPatientProfile();
    });

    async function loadPatientProfile() {
        try {
            const response = await fetch(`/api/v1/patient/${PATIENT_ID}/profile`, {
                headers: { 'X-Staff-ID': STAFF_ID }
            });
            const result = await response.json();
            
            if (result.success) {
                renderPatientInfo(result.patient);
                renderHistory(result.history);
                renderRiskAlerts(result.history);
            } else {
                alert("無法載入資料: " + result.error);
            }
        } catch (e) { console.error(e); }
    }

    function renderPatientInfo(p) {
        const container = document.getElementById('patient-info');
        container.innerHTML = `
            <div class="mb-3"><strong>姓名：</strong> ${p.name}</div>
            <div class="mb-3"><strong>電話：</strong> ${p.phone}</div>
            <div class="mb-3"><strong>出生日期：</strong> ${p.dob}</div>
            <div class="mb-3"><strong>病史紀錄：</strong> <br><span class="text-muted">${p.medical_history || '無'}</span></div>
            <div class="mb-0"><strong>藥物過敏：</strong> <br><span class="text-danger">${p.allergies || '無'}</span></div>
        `;
    }

    function renderHistory(history) {
        const container = document.getElementById('chat-history-container');
        if (history.length === 0) {
            container.innerHTML = '<p class="text-center text-muted">查無對話紀錄。</p>';
            return;
        }

        container.innerHTML = history.map(item => `
            <div class="mb-4 p-3 border rounded ${item.metadata.is_high_risk ? 'border-danger bg-light-danger' : 'bg-light'}">
                <div class="d-flex justify-content-between mb-2">
                    <span class="badge bg-dark">${formatDate(item.timestamp)}</span>
                    <span class="badge bg-info">經由 ${item.metadata.route_used}</span>
                </div>
                <div class="mb-2"><strong>問：</strong> ${item.messages[0].content}</div>
                <div class="text-primary"><strong>答：</strong> ${item.messages[1].content}</div>
                <div class="mt-2 text-end">
                    <small class="text-muted">信心度: ${item.metadata.confidence_score}%</small>
                </div>
            </div>
        `).join('');
    }

    function renderRiskAlerts(history) {
        const container = document.getElementById('risk-alerts');
        const risks = history.filter(h => h.metadata.is_high_risk);
        
        if (risks.length === 0) {
            container.innerHTML = '<div class="alert alert-success">✅ 目前無高風險紀錄</div>';
            return;
        }

        container.innerHTML = `
            <div class="alert alert-danger">🚨 偵測到 ${risks.length} 筆高風險對話</div>
            <ul class="list-group list-group-flush">
                ${risks.map(r => `<li class="list-group-item small">${r.messages[0].content.substring(0, 30)}...</li>`).join('')}
            </ul>
        `;
    }

    function formatDate(dateStr) {
        return new Date(dateStr).toLocaleString('zh-TW');
    }
</script>
<style>
    .bg-light-danger { background-color: #fff5f5; }
    .nav-tabs .nav-link { color: #64748b; }
    .nav-tabs .nav-link.active { font-weight: bold; color: var(--bs-primary); }
</style>
{% endblock %}
